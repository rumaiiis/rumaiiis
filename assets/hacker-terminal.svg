<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020B07"/>
      <stop offset="1" stop-color="#041A12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00FF88"/>
      <stop offset="1" stop-color="#0AAE66"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="640" height="360" rx="22" fill="url(#bg)"/>

  <g opacity="0.2">
    <path d="M0 54H640M0 108H640M0 162H640M0 216H640M0 270H640M0 324H640" stroke="#00FF88" stroke-width="0.8"/>
    <path d="M64 0V360M128 0V360M192 0V360M256 0V360M320 0V360M384 0V360M448 0V360M512 0V360M576 0V360" stroke="#00FF88" stroke-width="0.8"/>
  </g>

  <rect x="24" y="24" width="592" height="312" rx="18" fill="#03110C" stroke="#0B6E46" stroke-width="1.2"/>
  <rect x="24" y="24" width="592" height="36" rx="18" fill="#051A12"/>
  <circle cx="48" cy="42" r="5" fill="#00FF88" opacity="0.9"/>
  <circle cx="66" cy="42" r="5" fill="#0AAE66" opacity="0.7"/>
  <circle cx="84" cy="42" r="5" fill="#7DFFB7" opacity="0.5"/>

  <text x="114" y="47" fill="#CFFFE1" font-family="'Fira Code', monospace" font-size="15">root@rumais:~# monitor --live</text>

  <g font-family="'Fira Code', monospace" fill="#CFFFE1">
    <text x="48" y="102" font-size="15">$ stack status</text>
    <text x="48" y="130" font-size="14" fill="#7DFFB7">[online]</text>
    <text x="132" y="130" font-size="14">wazuh</text>
    <text x="48" y="156" font-size="14" fill="#7DFFB7">[online]</text>
    <text x="132" y="156" font-size="14">crowdstrike</text>
    <text x="48" y="182" font-size="14" fill="#7DFFB7">[online]</text>
    <text x="132" y="182" font-size="14">sentinelone</text>
    <text x="48" y="208" font-size="14" fill="#7DFFB7">[active]</text>
    <text x="132" y="208" font-size="14">atomic-red-team</text>
    <text x="48" y="234" font-size="14" fill="#7DFFB7">[loaded]</text>
    <text x="132" y="234" font-size="14">sigma / yara / vectr</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="392" y="98" width="168" height="118" rx="14" fill="#03140D" stroke="#00FF88" stroke-width="1.2"/>
    <path d="M412 188L440 144L466 170L490 126L520 158L542 132" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="d" dur="4s" repeatCount="indefinite"
        values="M412 188L440 144L466 170L490 126L520 158L542 132;
                M412 180L440 156L466 146L490 168L520 138L542 148;
                M412 188L440 144L466 170L490 126L520 158L542 132"/>
    </path>
    <circle cx="490" cy="126" r="4" fill="#00FF88">
      <animate attributeName="cy" dur="4s" repeatCount="indefinite"
        values="126;168;126"/>
    </circle>
  </g>

  <text x="48" y="286" fill="#7DFFB7" font-family="'Fira Code', monospace" font-size="14">$ detection_engine --mode live_telemetry</text>
  <text x="48" y="312" fill="#CFFFE1" font-family="'Fira Code', monospace" font-size="14">response:</text>
  <text x="138" y="312" fill="#00FF88" font-family="'Fira Code', monospace" font-size="14">stable</text>

  <rect x="206" y="300" width="10" height="16" fill="#00FF88">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <rect x="-640" y="0" width="640" height="360" fill="url(#glow)" opacity="0.06">
    <animate attributeName="x" values="-640;640" dur="4.5s" repeatCount="indefinite"/>
  </rect>
</svg>
